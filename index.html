        const quizData = [
            { id: 1, question: "無線網路主要是利用何者作為網路訊號的傳輸媒介？", options: ["電磁波", "紅外線", "聲波", "電流"], answer: ["電磁波"], type: "single", textbook: "逐漸發展出「無線網路」，改以電磁波作為網路訊號的傳輸媒介。", explanation: "無線網路不需要實體線路，它是靠著在空間中傳遞的「電磁波」來傳送資料的喔！" },
            { id: 2, question: "關於無線網路電磁波的「頻率」、「傳輸速度」、「受障礙物影響」與「傳輸距離」之間的關係，下列敘述何者正確？", options: ["頻率越高，傳輸速度越快、越易受障礙物影響、傳輸距離越短", "頻率越高，傳輸速度越慢、越容易穿透障礙物、傳輸距離越長", "頻率越低，傳輸速度越快、越容易穿透障礙物、傳輸距離越短", "頻率越低，傳輸速度越慢、越易受障礙物影響、傳輸距離越長"], answer: ["頻率越高，傳輸速度越快、越易受障礙物影響、傳輸距離越短"], type: "single", textbook: "電磁波頻率越高，傳輸速度也越快；但訊號易受到障礙物的影響而衰減，因此能傳輸的距離比較短。", explanation: "頻率就像是車速，越高頻（快車）雖然帶的資料多，但遇到牆壁就很難繞過去，所以跑不遠。" },
            { id: 3, question: "(複選題) 下列哪些技術屬於「無線網路」傳輸方式？", options: ["Bluetooth", "Wi-Fi", "行動網路", "光纖", "乙太網路", "ADSL", "藍芽"], answer: ["Bluetooth", "Wi-Fi", "行動網路"], type: "multiple", textbook: "常見的無線網路有藍牙、Wi-Fi、行動網路等。", explanation: "這題要選出「不用實體線」的技術。藍牙、Wi-Fi 跟行動網路都是電磁波傳輸；光纖和乙太網路則需實體線。" },
            { id: 4, question: "關於常見無線網路技術的「傳輸距離」，由大到小排序何者正確？", options: ["行動網路 > Wi-Fi > 藍牙", "行動網路 > 藍牙 > Wi-Fi", "Wi-Fi > 行動網路 > 藍牙", "藍牙 > Wi-Fi > 行動網路"], answer: ["行動網路 > Wi-Fi > 藍牙"], type: "single", textbook: "行動網路：訊號涵蓋範圍很廣（WWAN）。Wi-Fi：開放空間約 300 公尺。藍牙：傳輸距離約 10~300 公尺。", explanation: "行動網路靠基地台跨城通訊；Wi-Fi 涵蓋一棟建築；藍牙只在幾公尺內的個人裝置間通訊。" },
            { id: 5, question: "下列哪一種無線網路技術，傳輸距離短且主要用於個人裝置連接，又稱為「無線個人網路」（WPAN）？", options: ["藍牙", "Wi-Fi", "行動網路", "衛星網路"], answer: ["藍牙"], type: "single", textbook: "藍牙主要應用於個人行動載具與周邊設備的連接，因此被稱為「無線個人網路」。", explanation: "藍牙（Bluetooth）設計初衷是為了連結耳機、滑鼠等「個人」裝置，所以叫 WPAN。" },
            { id: 6, question: "下列哪一種無線網路技術，其傳輸範圍通常涵蓋一棟建築物或校園內，又稱為「無線區域網路」（WLAN）？", options: ["Wi-Fi", "藍牙", "行動網路", "近場通訊 (NFC)"], answer: ["Wi-Fi"], type: "single", textbook: "Wi-Fi 可以讓同個區域中的電腦一起上網，所以又稱為「無線區域網路」。", explanation: "教室或家裡常用的無線訊號就是 Wi-Fi，範圍剛好覆蓋一個特定的「區域」。" },

        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function renderProgress() {
            const container = document.getElementById('progress-container');
            container.innerHTML = '';
            quizData.forEach((_, idx) => {
                const dot = document.createElement('div');
                dot.className = `progress-dot flex-shrink-0 w-9 h-9 md:w-10 md:h-10 rounded-full border-2 flex items-center justify-center font-bold cursor-pointer transition-all`;
                dot.innerText = idx + 1;
                if (passedQuestions.has(idx)) {
                    dot.classList.add('passed');
                    dot.innerHTML = '✓';
                } else if (idx === currentIndex) {
                    dot.classList.add('active');
                } else {
                    dot.classList.add('bg-white', 'text-gray-300', 'border-gray-200');
                }
                container.appendChild(dot);
            });
        }

        function renderQuestion() {
            const q = quizData[currentIndex];
            document.getElementById('question-index-display').innerText = currentIndex + 1;
            document.getElementById('total-questions-display').innerText = quizData.length;
            document.getElementById('question-text').innerText = q.question;
            const hint = document.getElementById('question-hint');
            hint.innerText = q.type === 'multiple' ? "提示：此題為複選題，請選出所有正確選項" : "";
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            let options = [...q.options];
            options = shuffleArray(options);
            const displayColors = shuffleArray([...colors]);
            
            options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = `p-4 md:p-5 rounded-2xl md:rounded-3xl text-left font-medium text-gray-700 shadow-sm border-2 border-transparent transition-all btn-hover touch-manipulation ${displayColors[idx % colors.length]}`;
                btn.innerText = opt;
                btn.onclick = () => selectOption(btn, q.type);
                grid.appendChild(btn);
            });
            renderProgress();
        }

        function selectOption(btn, type) {
            if (type === 'single') {
                document.querySelectorAll('#options-grid button').forEach(b => {
                    b.classList.remove('border-pink-500', 'ring-4', 'ring-pink-100');
                    delete b.dataset.selected;
                });
                btn.classList.add('border-pink-500', 'ring-4', 'ring-pink-100');
                btn.dataset.selected = "true";
            } else {
                if (btn.dataset.selected === "true") {
                    btn.classList.remove('border-pink-500', 'ring-4', 'ring-pink-100');
                    delete btn.dataset.selected;
                } else {
                    btn.classList.add('border-pink-500', 'ring-4', 'ring-pink-100');
                    btn.dataset.selected = "true";
                }
            }
        }

        async function checkAnswer() {
            const q = quizData[currentIndex];
            const selectedBtns = Array.from(document.querySelectorAll('#options-grid button[data-selected="true"]'));
            if (selectedBtns.length === 0) {
                showModal("請選擇一個答案再檢查喔！");
                return;
            }
            const selectedValues = selectedBtns.map(b => b.innerText).sort();
            const correctValues = [...q.answer].sort();
            const isCorrect = selectedValues.length === correctValues.length && selectedValues.every((v, i) => v === correctValues[i]);
            
            currentAttempts[currentIndex]++;
            
            if (isCorrect) {
                passedQuestions.add(currentIndex);
                const overlay = document.getElementById('success-overlay');
                overlay.classList.replace('opacity-0', 'opacity-100');
                setTimeout(() => {
                    overlay.classList.replace('opacity-100', 'opacity-0');
                    if (currentIndex < quizData.length - 1) {
                        currentIndex++;
                        renderQuestion();
                    } else {
                        showResult();
                    }
                }, 600);
            } else {
                showLearningFeedback(q);
            }
        }

        function showLearningFeedback(question) {
            const overlay = document.getElementById('feedback-overlay');
            const textbook = document.getElementById('feedback-textbook');
            const explanation = document.getElementById('feedback-explanation');
            const closeBtn = document.getElementById('feedback-close-btn');
            const progressBar = document.getElementById('feedback-progress');
            const explanationContent = document.getElementById('explanation-content');
            const arrow = document.getElementById('explanation-arrow');
            const toggleBtn = document.getElementById('toggle-explanation-btn');
            
            explanationContent.classList.remove('open');
            arrow.style.transform = 'rotate(0deg)';
            textbook.innerText = question.textbook;
            explanation.innerText = question.explanation;
            overlay.classList.remove('hidden');
            
            let timeLeft = 10; 
            closeBtn.disabled = true;
            closeBtn.classList.replace('bg-pink-400', 'bg-gray-200');
            closeBtn.classList.replace('text-white', 'text-gray-500');
            closeBtn.classList.add('cursor-not-allowed');
            closeBtn.innerText = `請認真閱讀內容`;
            progressBar.style.width = '100%';
            
            const timer = setInterval(() => {
                timeLeft -= 0.1;
                progressBar.style.width = `${(timeLeft / 10) * 100}%`;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    progressBar.style.width = '0%';
                    closeBtn.disabled = false;
                    closeBtn.innerText = "我懂了，再試一次";
                    closeBtn.classList.replace('bg-gray-200', 'bg-pink-400');
                    closeBtn.classList.replace('text-gray-500', 'text-white');
                    closeBtn.classList.replace('cursor-not-allowed', 'cursor-pointer');
                    closeBtn.classList.add('btn-hover');
                }
            }, 100);

            toggleBtn.onclick = () => {
                const isOpen = explanationContent.classList.toggle('open');
                arrow.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
            };

            closeBtn.onclick = () => {
                overlay.classList.add('hidden');
                renderQuestion();
            };
        }

        function showResult() {
            const endTime = Date.now();
            const timeTakenSec = Math.floor((endTime - startTime) / 1000);
            const mm = String(Math.floor(timeTakenSec / 60)).padStart(2, '0');
            const ss = String(timeTakenSec % 60).padStart(2, '0');
            const totalAttemptsSum = currentAttempts.reduce((a, b) => a + b, 0);

            const challengeKey = `challenges_${studentId}_2-2`;
            let challenges = parseInt(localStorage.getItem(challengeKey) || "0") + 1;
            localStorage.setItem(challengeKey, challenges);

            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('result-page').classList.remove('hidden');
            document.getElementById('student-id-display').innerText = studentId;
            document.getElementById('total-time').innerText = `${mm}:${ss}`;
            document.getElementById('total-challenges-display').innerText = challenges;
            document.getElementById('quote-area').innerText = quotes[Math.floor(Math.random() * quotes.length)];
            
            syncToGAS(timeTakenSec, challenges, totalAttemptsSum);
        }

        async function syncToGAS(timeTaken, challenges, totalAttemptsSum) {
            const status = document.getElementById('sync-status');
            const data = {
                id: studentId,
                date: new Date().toLocaleString('zh-TW'),
                challenges: challenges,        
                duration: timeTaken,
                attemptsDetail: currentAttempts.join(', '),
                totalAttempts: totalAttemptsSum, 
                totalScore: passedQuestions.size,
                chapter: "2-2"
            };

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                status.innerText = "數據已成功儲存至雲端 ✓";
            } catch (e) {
                status.innerText = "數據同步失敗，請截圖保留結果。";
            }
        }

        function autoDetectClass() {
            const now = new Date();
            const day = now.getDay(); 
            const currentTime = now.getHours() * 60 + now.getMinutes(); 
            let found = false;

            if (timetable[day]) {
                for (const slot of timetable[day]) {
                    const [sH, sM] = slot.start.split(":").map(Number);
                    const [eH, eM] = slot.end.split(":").map(Number);
                    if (currentTime >= (sH * 60 + sM) && currentTime <= (eH * 60 + eM)) {
                        document.getElementById('input-class').value = slot.cls;
                        found = true;
                        break;
                    }
                }
            }
            
            // 辨識超時處理：若 3 秒後仍無辨識結果且輸入框為空
            setTimeout(() => {
                const classInput = document.getElementById('input-class');
                if (!classInput.value) {
                    classInput.placeholder = "請輸入班級...";
                }
            }, 3000);
        }

        function initQuiz() {
            const cls = parseInt(document.getElementById('input-class').value);
            const seat = parseInt(document.getElementById('input-seat').value);
            const errorHint = document.getElementById('auth-error');

            if (isNaN(cls) || isNaN(seat) || cls < 801 || cls > 910 || seat < 1 || seat > 38) {
                errorHint.classList.remove('hidden');
                return;
            }

            studentId = `${cls}-${seat}`;
            startTime = Date.now();
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('app').classList.remove('opacity-20', 'pointer-events-none');
            renderQuestion();
        }

        window.onload = () => {
            autoDetectClass();
            document.getElementById('start-quiz-btn').onclick = initQuiz;
            document.getElementById('modal-close').onclick = () => { document.getElementById('modal-overlay').classList.add('hidden'); };
            document.getElementById('check-btn').onclick = checkAnswer;
            window.onkeydown = (e) => { 
                if (e.key === 'Enter' && !document.getElementById('auth-modal').classList.contains('hidden')) initQuiz(); 
            };
        };
    </script>
</body>
</html>
